# .readthedocs.yaml
version: 2

build:
  os: ubuntu-22.04
  tools:
    python: "3.10"

python:
  install:
    - method: pip
      path: .
    - requirements: docs/requirements.txt

sphinx:
  configuration: docs/source/conf.py
  # Read the Docs does not use the Makefile, so -W has to be set here too.
  # autodoc downgrades a failed import to a warning and renders an empty page,
  # which would otherwise publish an API reference with no content.
  fail_on_warning: true
