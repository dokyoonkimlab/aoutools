# Pre-commit hooks for aoutools.
# Install once after `pixi install`:  pixi run setup-hooks
# Run manually against everything:    pixi run lint
#
# The ruff hooks shell out to `pixi run -e lint`, so they always use the ruff
# pinned in pixi.lock -- one source of truth, no second copy to drift. They
# deliberately do NOT call a bare `ruff`: that resolves via PATH, which only
# works inside a direnv-activated shell and fails for anyone committing from a
# bare shell or an editor GUI. Config for both lives in [tool.ruff] in
# pyproject.toml.

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: check-added-large-files
        args: ["--maxkb=10240"] # 10 MB
      - id: detect-private-key
      - id: check-yaml
      - id: check-toml
      - id: check-merge-conflict
      - id: end-of-file-fixer
      - id: trailing-whitespace

  - repo: local
    hooks:
      - id: ruff-format
        name: ruff format
        entry: pixi run -e lint ruff format --force-exclude
        language: system
        # `jupyter` includes .ipynb: ruff lints notebook code cells, and CI
        # (`ruff check .`) does too, so pre-commit must, or the two disagree
        # and a notebook lands lint-clean locally but red in CI.
        types_or: [python, pyi, jupyter]
        require_serial: true
      - id: ruff-check
        name: ruff lint (autofix)
        entry: pixi run -e lint ruff check --fix --force-exclude
        language: system
        # `jupyter` includes .ipynb: ruff lints notebook code cells, and CI
        # (`ruff check .`) does too, so pre-commit must, or the two disagree
        # and a notebook lands lint-clean locally but red in CI.
        types_or: [python, pyi, jupyter]
        require_serial: true
