name: CI

# `docs/**` is deliberately NOT ignored: the docs job builds with -W, and an
# autodoc break can come from either a docs change or a code change, so both
# must trigger CI. Only prose (*.md) is skipped.
on:
  push:
    branches: [main, dev]
    paths-ignore: ['**.md']
  pull_request:
    paths-ignore: ['**.md']

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Runs independently of the test job so a lint failure reports in seconds
  # rather than waiting on the hail/Spark environment to install.
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up pixi (lint environment)
        uses: prefix-dev/setup-pixi@v0.10.0
        with:
          pixi-version: v0.70.2
          environments: lint
          cache: true

      # Checks only; never writes. Use `pixi run format` locally to fix.
      - name: Ruff lint + format check
        run: pixi run -e lint lint

  # Builds with -W (see docs/Makefile). Sphinx mocks hail, so a hail-typed
  # annotation that cannot be evaluated under the mock fails the import, and
  # autodoc would otherwise emit a warning and publish an empty API reference.
  docs:
    name: Docs (sphinx -W)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up pixi (default environment)
        uses: prefix-dev/setup-pixi@v0.10.0
        with:
          pixi-version: v0.70.2
          environments: default
          cache: true

      - name: Build docs
        run: pixi run docs

  test:
    name: Tests (linux-64)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      # Installs the pinned pixi `ci` environment from pixi.lock: Python 3.11,
      # hail 0.2.135 (+ a JDK) and pytest. hail has no osx-arm64 wheel, so the
      # suite runs on Linux only, which matches the All of Us Spark runtime.
      - name: Set up pixi (ci environment)
        uses: prefix-dev/setup-pixi@v0.10.0
        with:
          pixi-version: v0.70.2
          environments: ci
          cache: true

      # This suite mocks hail, so no Spark backend is started; hail only needs
      # to be importable. It checks that the code calls the right hail methods,
      # not that the resulting scores are right -- that is the integration job.
      - name: Run test suite
        run: pixi run -e ci test

  # The only job that can tell a correct score from a wrong one. Starts a real
  # local Spark backend, builds a mock VDS and scores it, so allele orientation,
  # dosage and join keys are validated against hail rather than a MagicMock.
  # Kept separate from `test` so the mocked suite stays sub-second.
  integration:
    name: Integration (real hail)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up pixi (integration environment)
        uses: prefix-dev/setup-pixi@v0.10.0
        with:
          pixi-version: v0.70.2
          environments: integration
          cache: true

      - name: Run integration suite
        run: pixi run -e integration test-integration
